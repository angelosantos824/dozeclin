<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacientes | DOZECLIN</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/pacientes.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <div class="app-shell" data-app-shell>
    <aside class="sidebar" data-sidebar></aside>
    <main class="main">
      <div class="mobile-bar">
        <strong>DOZECLIN</strong>
        <button class="button button-secondary" type="button" data-menu-toggle>Menu</button>
      </div>
      <header class="topbar" data-topbar></header>
      <section class="content">
        <div class="page-header">
          <div>
            <h1>Pacientes</h1>
            <p>Cadastro inicial isolado por clinica.</p>
          </div>
          <button class="button" type="button" data-new-patient>Novo paciente</button>
        </div>

        <div class="panel">
          <div class="toolbar">
            <input type="search" data-filter placeholder="Pesquisar por nome, email, telefone ou documento">
            <span class="muted" data-page-status role="status" aria-live="polite">A carregar...</span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Email</th>
                  <th>Telefone</th>
                  <th>Estado</th>
                  <th>Acoes</th>
                </tr>
              </thead>
              <tbody data-patients-table></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" data-patient-modal hidden>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="patient-modal-title">
      <div class="modal-header">
        <div>
          <h2 id="patient-modal-title">Paciente</h2>
          <p class="muted">Dados basicos da Sprint 1.</p>
        </div>
        <button class="icon-button" type="button" data-close-modal>Fechar</button>
      </div>

      <div data-form-message aria-live="polite" hidden></div>

      <form data-patient-form class="form-grid">
        <label class="field">
          Nome completo
          <input name="full_name" required>
        </label>
        <label class="field">
          Email
          <input type="email" name="email" required>
        </label>
        <label class="field">
          Telefone
          <input name="phone" inputmode="tel">
        </label>
        <label class="field">
          Data de nascimento
          <input type="date" name="birth_date">
        </label>
        <label class="field">
          Documento
          <input name="document">
        </label>
        <label class="field">
          Fuso horario
          <select name="timezone">
            <option value="Europe/Lisbon">Portugal</option>
            <option value="America/Sao_Paulo">Brasil - Sao Paulo/Brasilia</option>
            <option value="America/Manaus">Brasil - Manaus</option>
            <option value="America/Fortaleza">Brasil - Fortaleza</option>
          </select>
        </label>
        <label class="field">
          Estado
          <select name="status">
            <option value="active">Ativo</option>
            <option value="inactive">Inativo</option>
            <option value="discharged">Alta</option>
            <option value="archived">Arquivado</option>
          </select>
        </label>
        <label class="field field-full">
          Endereco
          <textarea name="address"></textarea>
        </label>
        <button class="button field-full" type="submit">Guardar paciente</button>
      </form>
    </div>
  </div>

  <script type="module" src="../assets/js/pages/pacientes.js"></script>
</body>
</html>
